spring.application.name=backend
server.port=8082
rate-limit.enabled=true


spring.datasource.url=jdbc:mysql://localhost:3306/confessionverse
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss
spring.jackson.serialization.write-dates-as-timestamps=false

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=259200000

# Debug logging
logging.level.org.springframework.security=DEBUG
logging.level.com.confessionverse.backend.service.MessageService=DEBUG
logging.level.com.confessionverse.backend.controller.MessageController=DEBUG
logging.level.com.confessionverse.backend.mapper=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE

# OpenAI config
openai.api.key=${OPENAI_API_KEY:}
openai.api.url=https://api.openai.com/v1/chat/completions
openai.model=gpt-4o

# Payments

BILLING_CANCEL_URL=http://localhost:5173/billing/cancel                
BILLING_PORTAL_RETURN_URL=http://localhost:5173/settings/billing  

server.error.include-message=always
logging.level.org.springframework.web=DEBUG
logging.level.com.confessionverse=DEBUG

# Protected admin account for deletion safeguards
app.admin.protected-email=admin@confessionverse.local

# Report moderation email behavior (disabled by default)
app.reports.email-enabled=false

# Password reset
app.password-reset.token-ttl-minutes=${PASSWORD_RESET_TOKEN_TTL_MINUTES:60}
app.password-reset.frontend-base-url=${FRONTEND_BASE_URL:http://localhost:5173}
app.password-reset.email-from=${SMTP_FROM:no-reply@confessionverse.local}

# SMTP
spring.mail.host=${SMTP_HOST:}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USER:}
spring.mail.password=${SMTP_PASS:}
spring.mail.properties.mail.smtp.auth=${SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_STARTTLS_ENABLE:true}

# Stripe billing
stripe.secret-key=${STRIPE_SECRET_KEY:}
stripe.webhook-signing-secret=${STRIPE_WEBHOOK_SIGNING_SECRET:}
# Stripe checkout defaults for Pro monthly plans
stripe.checkout.default-currency=${STRIPE_CHECKOUT_DEFAULT_CURRENCY:usd}
stripe.checkout.product-name=${STRIPE_CHECKOUT_PRODUCT_NAME:ConfessionVerse Pro}
stripe.checkout.unit-amount-cents.usd=${STRIPE_CHECKOUT_UNIT_AMOUNT_CENTS_USD:159}
stripe.checkout.unit-amount-cents.gbp=${STRIPE_CHECKOUT_UNIT_AMOUNT_CENTS_GBP:129}
stripe.checkout.unit-amount-cents.ron=${STRIPE_CHECKOUT_UNIT_AMOUNT_CENTS_RON:790}
app.billing.success-url=${BILLING_SUCCESS_URL:http://localhost:5173/billing/success}
app.billing.cancel-url=${BILLING_CANCEL_URL:http://localhost:5173/billing/cancel}
app.billing.portal-return-url=${BILLING_PORTAL_RETURN_URL:http://localhost:5173/settings/billing}
app.billing.email-from=${SMTP_FROM:no-reply@confessionverse.local}
app.billing.email-fallback-enabled=${BILLING_EMAIL_FALLBACK_ENABLED:true}

# Free plan limits (entitlements come from subscription status)
limits.enabled=${LIMITS_ENABLED:true}
free.maxMessagesPerDay=${FREE_MAX_MESSAGES_PER_DAY:100}
free.maxRoomsPerDay=${FREE_MAX_ROOMS_PER_DAY:${FREE_MAX_ROOMS:5}}
premium.gates.enabled=${PREMIUM_GATES_ENABLED:true}

# Chat invitations
chat.invites.ttl-hours=${CHAT_INVITES_TTL_HOURS:24}
chat.invites.cleanup-interval-minutes=${CHAT_INVITES_CLEANUP_INTERVAL_MINUTES:10}

management.endpoints.web.base-path=/actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true